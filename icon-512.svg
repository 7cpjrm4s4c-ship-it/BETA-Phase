<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090f"/>
      <stop offset="100%" style="stop-color:#111120"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fa3e8"/>
      <stop offset="100%" style="stop-color:#4fe8b3"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#4fa3e8;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#4fa3e8;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Halo -->
  <ellipse cx="256" cy="200" rx="220" ry="180" fill="url(#halo)"/>

  <!-- Glass card -->
  <rect x="80" y="140" width="352" height="232" rx="32"
        fill="rgba(255,255,255,0.055)"
        stroke="rgba(255,255,255,0.12)"
        stroke-width="1.5"/>

  <!-- Main symbol ṁ -->
  <text x="256" y="290"
        fill="url(#glow)"
        dominant-baseline="middle"
        text-anchor="middle"
        font-family="-apple-system, Helvetica Neue, sans-serif"
        font-size="160"
        font-weight="700"
        filter="url(#blur-glow)">ṁ</text>

  <!-- Subtle border highlight -->
  <rect x="80" y="140" width="352" height="232" rx="32"
        fill="none"
        stroke="rgba(255,255,255,0.05)"
        stroke-width="3"/>
</svg>
